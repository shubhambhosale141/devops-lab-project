name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Commit SHA
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-lab-project:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-lab-project:${{ steps.vars.outputs.SHA }} .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-lab-project:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-lab-project:${{ steps.vars.outputs.SHA }}
